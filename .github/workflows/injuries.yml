name: Injuries feed

# Daily availability hints: regenerates injuries.json and commits it when
# it changed. Deliberately its own workflow — it never touches Supabase or
# the stats pulls; a failure here just means stale/absent injury badges.
on:
  schedule:
    - cron: "30 4 * * *"   # 06:30 SAST, after the daily stats pull
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: injuries
  cancel-in-progress: false

jobs:
  injuries:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build injuries.json
        env:
          DRAFT_SPORT_KEY: ${{ secrets.DRAFT_SPORT_KEY }}
        run: python build_injuries.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add injuries.json
          git diff --cached --quiet || { git commit -m "injuries: daily update"; git pull --rebase origin master; git push; }
